
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>No Man's Sky — 256 Galaxy Map</title> 
<link rel="icon" type="image/png" href="favicon.png">
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 24px;
        background: radial-gradient(circle at top, #111827 0%, #020617 65%);
        color: #e5e7eb;
        font-family: Arial, Helvetica, sans-serif;
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 2.5rem;
        letter-spacing: 1px;
    }

    .subtitle {
        text-align: center;
        margin-bottom: 24px;
        color: #94a3b8;
    }

    .legend {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 28px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 999px;
        padding: 8px 14px;
    }

    .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
    }

    .normal-dot { background: #38bdf8; }
    .lush-dot { background: #22c55e; }
    .harsh-dot { background: #ef4444; }
    .empty-dot { background: #8b5cf6; }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
    }

    .galaxy {
        position: relative;
        border-radius: 14px;
        padding: 10px 38px 10px 10px;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(8px);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        cursor: pointer;
        user-select: none;
    }

    .galaxy:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 14px rgba(255,255,255,0.12);
    }

    .normal {
        background: rgba(56, 189, 248, 0.14);
        border-color: rgba(56, 189, 248, 0.4);
    }

    .lush {
        background: rgba(34, 197, 94, 0.14);
        border-color: rgba(34, 197, 94, 0.4);
    }

    .harsh {
        background: rgba(239, 68, 68, 0.14);
        border-color: rgba(239, 68, 68, 0.4);
    }

    .empty {
        background: rgba(139, 92, 246, 0.14);
        border-color: rgba(139, 92, 246, 0.4);
    }

    .number {
        font-size: 0.75rem;
        color: #cbd5e1;
        margin-bottom: 4px;
    }

    .name {
        font-size: 0.95rem;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .type {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: bold;
        text-transform: uppercase;
        background: rgba(255,255,255,0.08);
    }

    /* check box */
    .check {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 2px solid rgba(255,255,255,0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: transparent;
        transition: all 0.2s ease;
    }

    .visited .check {
        background: #22c55e;
        border-color: #22c55e;
        color: #0b1220;
        font-weight: bold;
    }

    footer {
        text-align: center;
        margin-top: 28px;
        color: #94a3b8;
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<footer>

const lush = new Set([10,19,30,39,50,59,70,79,90,99,110,119,130,139,150,159,170,179,190,199,210,219,230,239,250]);

const empty = new Set([7,12,27,32,47,52,67,72,87,92,107,112,127,132,147,152,167,172,187,192,207,212,227,232,247,252]);

function getType(id) {
    if (lush.has(id)) return 'lush';
    if (harsh.has(id)) return 'harsh';
    if (empty.has(id)) return 'empty';
    return 'normal';
}

function label(type) {
    return type.charAt(0).toUpperCase() + type.slice(1);
}

const grid = document.getElementById('galaxyGrid');

function toggleVisited(el, id) {
    el.classList.toggle('visited');

    const visited = JSON.parse(localStorage.getItem('visitedGalaxies') || '{}');
    visited[id] = !visited[id];
    localStorage.setItem('visitedGalaxies', JSON.stringify(visited));
}

const saved = JSON.parse(localStorage.getItem('visitedGalaxies') || '{}');

galaxies.forEach(([id, name]) => {
    const type = getType(id);

    const card = document.createElement('div');
    card.className = `galaxy ${type}`;

    if (saved[id]) card.classList.add('visited');

    card.onclick = () => toggleVisited(card, id);

    card.innerHTML = `
        <div class="number">#${id}</div>
        <div class="name">${name}</div>
        <div class="type">${label(type)}</div>
        <div class="check">✓</div>
    `;

    grid.appendChild(card);
});
</script>
